# ─── Render Blueprint ─────────────────────────────────────────────────────────
# Docs: https://render.com/docs/blueprint-spec
# Commit this file to your repo root. Render detects it automatically.

services:
  # ── Node.js API ──────────────────────────────────────────────────────────
  - type: web
    name: darshanease-api
    runtime: node
    rootDir: backend
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000        # Render assigns this; we bind 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: darshanease-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true   # Render generates a unique value automatically
      - key: FRONTEND_URL
        sync: false           # ← Paste your Vercel URL here after first deploy
    autoDeploy: true

databases:
  # ── Managed PostgreSQL ──────────────────────────────────────────────────
  - name: darshanease-db
    databaseName: darshanease
    user: darshanease
    plan: free
